services:
  fanbridge:
    build:
      context: .
      dockerfile: container/Dockerfile
    image: ghcr.io/robrolabs/fanbridge:latest
    environment:
      TZ: ${TZ:-Europe/London}
      FANBRIDGE_DISKS_STALE_WARN_SEC: "600"
    ports:
      - "8080:8080"
    volumes:
      - ./dev-appdata:/config
      # On an Unraid host, enable this read-only directory mapping. FanBridge
      # deliberately ships no fabricated disks.ini data.
      # - /var/local/emhttp:/unraid:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    # Map each physical controller to a distinct path. Prefer a stable host
    # /dev/serial/by-id entry; never expose all of /dev.
    # devices:
    #   - "/dev/serial/by-id/usb-Your_DIY_Controller:/dev/ttyACM0"
    # The custom six-channel target is reserved for a future host/firmware
    # release; do not add this mapping to the current application yet.
    #   - "/dev/serial/by-id/usb-Your_Six_Channel_Controller:/dev/ttyACM1"
    restart: unless-stopped
