name: Bug Report
description: Create a report to help us improve FanBridge.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.
  - type: input
    id: version
    attributes:
      label: FanBridge Version
      description: What version of FanBridge are you running? (e.g., 1.1.0)
      placeholder: "1.1.0"
    validations:
      required: true
  - type: input
    id: unraid_version
    attributes:
      label: Unraid Version
      description: What version of Unraid are you currently running?
      placeholder: "6.12.8"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please copy and paste any relevant logs from the FanBridge UI or Docker container.
      render: text
    validations:
      required: false
