name: Create DIY firmware release

on:
  push:
    tags: ['fw-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing DIY firmware tag (for example, fw-v2.4.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-diy-firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag and derive version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          ref_name="$EVENT_REF_NAME"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            ref_name="$INPUT_TAG"
          fi
          if [[ ! "$ref_name" =~ ^fw-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid DIY firmware release tag: $ref_name" >&2
            exit 1
          fi
          {
            printf 'REF_NAME=%s\n' "$ref_name"
            printf 'VER_NO_V=%s\n' "${ref_name#fw-v}"
          } >> "$GITHUB_ENV"

      - name: Check out the DIY firmware tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.REF_NAME }}

      - name: Require recorded DIY hardware qualification
        shell: bash
        env:
          VERSION: ${{ env.VER_NO_V }}
          APPROVED_VERSION: ${{ vars.DIY_FIRMWARE_HIL_APPROVED_VERSION }}
        run: |
          set -euo pipefail
          if [[ -z "$APPROVED_VERSION" || "$APPROVED_VERSION" != "$VERSION" ]]; then
            echo "DIY firmware $VERSION is not approved for release." >&2
            echo "Complete and record the README hardware-in-the-loop matrix, then set the protected repository variable DIY_FIRMWARE_HIL_APPROVED_VERSION=$VERSION." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install PlatformIO
        run: python -m pip install --disable-pip-version-check platformio==6.1.19

      - name: Validate DIY source version and build firmware
        shell: bash
        env:
          VERSION: ${{ env.VER_NO_V }}
        run: |
          set -euo pipefail
          source_version=$(sed -n 's/.*FW_VERSION = "\([^"]*\)".*/\1/p' fanbridge-link/rp2040/src/main.cpp | head -n 1)
          if [[ "$source_version" != "$VERSION" ]]; then
            echo "DIY firmware source version $source_version does not match release $VERSION" >&2
            exit 1
          fi
          pio run --project-dir fanbridge-link/rp2040
          asset="fanbridge-rp2040-${VERSION}.uf2"
          cp fanbridge-link/rp2040/.pio/build/pico/firmware.uf2 "$asset"
          sha256sum "$asset" > "$asset.sha256"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.REF_NAME }}
          name: DIY firmware ${{ env.VER_NO_V }}
          body: 'Single-channel DIY Raspberry Pi Pico/RP2040 firmware. This is not compatible with the future six-channel custom PCB. Verify the UF2 with the attached SHA-256 file before flashing.'
          draft: false
          prerelease: false
          files: |
            fanbridge-rp2040-${{ env.VER_NO_V }}.uf2
            fanbridge-rp2040-${{ env.VER_NO_V }}.uf2.sha256
