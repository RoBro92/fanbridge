name: PR Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        # We allow some leniency on line length for now (e.g., E501), focus on syntax/undefined names
        run: flake8 container/ --count --select=E9,F63,F7,F82 --show-source --statistics

  build-firmware:
    name: Build RP2040 Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build RP2040 Firmware
        run: |
          cd fanbridge-link/rp2040
          pio run

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: container/Dockerfile
          push: false
          tags: fanbridge:test
