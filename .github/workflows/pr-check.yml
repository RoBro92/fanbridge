name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate GitHub Actions workflows
        run: >-
          docker run --rm
          -v "$GITHUB_WORKSPACE:/repo:ro"
          -w /repo
          rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: container/requirements.txt

      - name: Install validation tools and runtime dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            -r container/requirements.txt \
            bandit==1.9.4 \
            flake8==7.3.0 \
            pip-audit==2.10.1 \
            pytest==9.1.1

      - name: Audit Python dependencies
        run: python -m pip_audit -r container/requirements.txt

      - name: Compile and lint Python
        run: |
          python -m compileall -q container
          flake8 container/ --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -q -ll -r container

      - name: Run backend test suite
        run: python -m pytest -q

      - name: Smoke-test public routes and auth boundary
        shell: bash
        run: |
          smoke_dir="$RUNNER_TEMP/fanbridge-smoke"
          cp -R container "$smoke_dir"
          cd "$smoke_dir"
          FANBRIDGE_CONFIG="$RUNNER_TEMP/fanbridge-config/config.yml" \
          FANBRIDGE_SETUP_TOKEN='ci-only-bootstrap-token' \
          python - <<'PY'
          import time
          import app as fanbridge

          client = fanbridge.app.test_client()
          for _ in range(20):
              if client.get('/health').status_code == 200:
                  break
              time.sleep(0.1)
          assert client.get('/health').status_code == 200
          assert client.get('/login').status_code == 200
          assert '/api/metrics' in {rule.rule for rule in fanbridge.app.url_map.iter_rules()}
          assert client.get('/api/metrics').status_code == 401
          PY

  frontend:
    name: Frontend build and asset gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, audit, and build frontend
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high
          npm run build

      - name: Verify generated asset references
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          html = Path('container/templates/index.html').read_text(encoding='utf-8')
          refs = re.findall(r'(?:src|href)="(/static/dist/[^"]+)"', html)
          assert refs, 'generated index.html has no /static/dist asset references'
          missing = [ref for ref in refs if not Path('container', ref.lstrip('/')).is_file()]
          assert not missing, f'missing generated assets: {missing}'
          PY

      - name: Require committed assets to match frontend source
        shell: bash
        run: |
          git diff --exit-code -- container/static/dist container/templates/index.html
          test -z "$(git ls-files --others --exclude-standard -- container/static/dist container/templates/index.html)"

  firmware:
    name: Build RP2040 firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install PlatformIO
        run: python -m pip install --disable-pip-version-check platformio==6.1.19

      - name: Build firmware
        working-directory: fanbridge-link/rp2040
        run: pio run

  docker:
    name: Build Docker image
    needs: [python, frontend, firmware]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image without publishing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: container/Dockerfile
          pull: true
          push: false
          load: true
          tags: fanbridge:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the built image and static allowlist
        shell: bash
        run: |
          docker run --rm \
            --read-only \
            --security-opt=no-new-privileges \
            --cap-drop=ALL \
            --tmpfs /config:rw,noexec,nosuid,size=16m \
            --tmpfs /tmp:rw,noexec,nosuid,size=16m \
            -e FANBRIDGE_SETUP_TOKEN=ci-only-bootstrap-token \
            --entrypoint python \
            fanbridge:test -c '
          import re
          import time
          import app as fanbridge

          client = fanbridge.app.test_client()
          for _ in range(20):
              if client.get("/health").status_code == 200:
                  break
              time.sleep(0.1)
          assert client.get("/health").status_code == 200
          login = client.get("/login")
          assert login.status_code == 200
          refs = set(re.findall(r"(?:src|href)=\"([^\"]+)\"", login.get_data(as_text=True)))
          static_refs = {ref for ref in refs if ref.startswith("/static/")}
          assert static_refs, "login page has no static references"
          missing = {ref: client.get(ref).status_code for ref in static_refs if client.get(ref).status_code != 200}
          assert not missing, f"missing login assets: {missing}"
          assert client.get("/api/metrics").status_code == 401
          '
          docker run --rm --entrypoint sh fanbridge:test -c '
          set -eu
          for forbidden in secret.key setup.token users.yml users.local.yml config.local.yml history.db history.db.bak dummy.log dummy_controller.py .env; do
            if find /app -name "$forbidden" -print -quit | grep -q .; then
              echo "forbidden runtime file: $forbidden" >&2
              exit 1
            fi
          done
          '

      - name: Scan built image for vulnerabilities and embedded secrets
        shell: bash
        run: |
          scanner='aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f'
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v fanbridge-trivy-cache:/root/.cache/ \
            "$scanner" image --scanners vuln --severity HIGH,CRITICAL \
            --ignore-unfixed --exit-code 1 fanbridge:test
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v fanbridge-trivy-cache:/root/.cache/ \
            "$scanner" image --scanners secret --exit-code 1 fanbridge:test
