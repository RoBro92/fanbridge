name: Repair GitHub release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (for example, v1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag and derive version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          ref_name="$EVENT_REF_NAME"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            ref_name="$INPUT_TAG"
          fi
          if [[ ! "$ref_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid application release tag: $ref_name" >&2
            exit 1
          fi
          {
            printf 'REF_NAME=%s\n' "$ref_name"
            printf 'VER_NO_V=%s\n' "${ref_name#v}"
          } >> "$GITHUB_ENV"

      - name: Check out the release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ env.REF_NAME }}

      - name: Extract release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ env.REF_NAME }}
          VERSION: ${{ env.VER_NO_V }}
        run: |
          set -euo pipefail
          awk -v ver="$VERSION" '
            $0 ~ "^##[[:space:]]*" ver "( |$)" {flag=1; next}
            flag && /^##[[:space:]]*[0-9]/ {flag=0}
            flag {print}
          ' RELEASE.md > RELEASE_SECTION.md
          if [[ ! -s RELEASE_SECTION.md ]]; then
            echo "Could not find notes for $VERSION in RELEASE.md; using fallback body." >&2
            printf 'Release %s\n' "$RELEASE_TAG" > RELEASE_SECTION.md
          fi
          printf 'BODY_FILE=RELEASE_SECTION.md\n' >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ env.REF_NAME }}
          name: ${{ env.REF_NAME }}
          body_path: ${{ steps.notes.outputs.BODY_FILE }}
          draft: false
          prerelease: false
