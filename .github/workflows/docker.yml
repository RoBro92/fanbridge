name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: container/requirements.txt

      - name: Test, audit, and lint backend
        run: |
          python -m pip install --disable-pip-version-check \
            -r container/requirements.txt \
            bandit==1.9.4 \
            flake8==7.3.0 \
            pip-audit==2.10.1 \
            pytest==9.1.1
          python -m pip_audit -r container/requirements.txt
          python -m compileall -q container
          flake8 container/ --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -q -ll -r container
          python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit and build frontend
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high
          npm test
          npm run build

      - name: Require committed assets to match frontend source
        shell: bash
        run: |
          git diff --exit-code -- container/static/dist container/templates/index.html
          test -z "$(git ls-files --others --exclude-standard -- container/static/dist container/templates/index.html)"

  publish:
    name: Publish image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive image tags
        id: vars
        shell: bash
        env:
          IMAGE: ghcr.io/robrolabs/fanbridge
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$REF_TYPE" == "tag" ]]; then
            if [[ ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid release tag: $REF_NAME" >&2
              exit 1
            fi
            version="${REF_NAME#v}"
            tags=$(printf '%s\n' \
              "$IMAGE:latest" \
              "$IMAGE:$COMMIT_SHA" \
              "$IMAGE:$REF_NAME" \
              "$IMAGE:$version")
          else
            tags=$(printf '%s\n' "$IMAGE:edge" "$IMAGE:$COMMIT_SHA")
          fi
          {
            printf 'tags<<FANBRIDGE_TAGS\n%s\nFANBRIDGE_TAGS\n' "$tags"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: container/Dockerfile
          pull: true
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  release:
    name: Create GitHub release
    if: github.ref_type == 'tag'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid application release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^##[[:space:]]*" ver "( |$)" {flag=1; next}
            flag && /^##[[:space:]]*[0-9]/ {flag=0}
            flag {print}
          ' RELEASE.md > RELEASE_SECTION.md
          if [[ ! -s RELEASE_SECTION.md ]]; then
            echo "Could not find notes for $version in RELEASE.md; using fallback body." >&2
            printf 'Release %s\n' "$RELEASE_TAG" > RELEASE_SECTION.md
          fi
          printf 'BODY_FILE=RELEASE_SECTION.md\n' >> "$GITHUB_OUTPUT"

      - name: Create GitHub release after image publication
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.BODY_FILE }}
          draft: false
          prerelease: false
